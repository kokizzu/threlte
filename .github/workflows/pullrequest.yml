name: Pull Request Checks

on:
  pull_request:
    branches:
      - main
      - next

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Lint 💅
        run: pnpm run lint

  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Check
        run: pnpm run check

  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        run: pnpm --filter @threlte/core exec playwright install-deps chromium

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            timeout 120 pnpm --filter @threlte/core exec playwright install chromium && exit 0
            echo "::warning::Playwright browser install attempt $attempt timed out or failed, retrying..."
          done
          echo "::error::Playwright browser install failed after 3 attempts"
          exit 1

      - name: Test core
        run: pnpm --filter @threlte/core exec vitest run --browser=chromium

  test-extras:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm 🔧
        uses: pnpm/action-setup@v4
        with:
          run_install: true

      - name: Cache Playwright Browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

      - name: Install Playwright system dependencies
        run: pnpm --filter @threlte/extras exec playwright install-deps chromium

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: |
          for attempt in 1 2 3; do
            timeout 120 pnpm --filter @threlte/extras exec playwright install chromium && exit 0
            echo "::warning::Playwright browser install attempt $attempt timed out or failed, retrying..."
          done
          echo "::error::Playwright browser install failed after 3 attempts"
          exit 1

      - name: Test extras
        run: pnpm --filter @threlte/extras exec vitest run --browser=chromium
